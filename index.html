<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社會技巧：選擇大挑戰 (紅綠燈規範版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #54a0ff; 
            --secondary: #a29bfe; 
            --success: #26de81; 
            --warning: #ffeaa7; 
            --danger: #ff7675; 
            --bg: #fffcf0;
            --text: #2d3436;
            --instruction-color: #ff9f43; 
        }

        /* 全螢幕設置 */
        html, body { 
            height: 100vh; 
            width: 100vw;
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Quicksand', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { 
            width: 98vw; 
            height: 96vh; 
            background: white; 
            padding: 15px; 
            border-radius: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border: 8px solid #f1f2f6;
            position: relative;
        }

        /* 標題與導引 */
        h1 { 
            font-size: 3.2rem; 
            margin: 5px 0; 
            color: var(--primary); 
            font-weight: 900;
            text-shadow: 3px 3px 0px #dff9fb;
        }
        
        .instruction { 
            font-size: 2.2rem; 
            color: var(--instruction-color); 
            font-weight: bold; 
            margin: 5px 0;
            text-shadow: 1px 1px 0px #fff;
        }

        /* 紅綠燈提示器樣式 */
        .traffic-light-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2d3436;
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        .light-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #444; /* 預設暗色 */
            transition: 0.3s;
        }
        .light-red.active { background: #ff4757; box-shadow: 0 0 20px #ff4757; }
        .light-yellow.active { background: #eccc68; box-shadow: 0 0 20px #eccc68; }
        .light-green.active { background: #2ecc71; box-shadow: 0 0 20px #2ecc71; }
        .light-label {
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            min-width: 120px;
            text-align: left;
        }

        /* 核心內容區 */
        .content-viewer { 
            flex: 1; 
            min-height: 0; 
            margin: 10px auto; 
            border: 8px solid var(--warning); 
            border-radius: 30px; 
            overflow: hidden; 
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 98%; 
            position: relative;
        }
        .content-viewer img { 
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
        }

        /* 學生加分格 */
        #score-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .student-card {
            background: #f1f2f6;
            border: 4px solid var(--primary);
            border-radius: 25px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }
        .student-name { font-size: 1.8rem; font-weight: bold; color: var(--text); }
        .student-score { font-size: 3.2rem; font-weight: 900; color: var(--danger); }
        .add-btn {
            width: 90%;
            padding: 8px;
            font-size: 1.5rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0px #21b677;
        }
        .add-btn:active { transform: translateY(3px); box-shadow: 0 2px 0px #21b677; }

        /* 按鈕區域 */
        .choices-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            width: 100%;
            max-width: 1000px; 
            margin: 10px auto; 
        }
        button.choice-btn { 
            padding: 15px; 
            font-size: 1.8rem; 
            cursor: pointer; 
            border: 6px solid var(--primary); 
            background: white; 
            border-radius: 30px; 
            font-weight: bold; 
        }

        .nav-grid { display: flex; justify-content: center; align-items: center; width: 100%; gap: 30px; margin-top: 10px; }
        .nav-btn { 
            padding: 10px 40px; 
            font-size: 1.6rem; 
            cursor: pointer; 
            border-radius: 40px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: bold;
            box-shadow: 0 5px 0px #2980b9;
        }
        .nav-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        .home-btn { position: absolute; top: 20px; right: 20px; padding: 8px 25px; background: #dfe6e9; color: #636e72; border: none; border-radius: 15px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }

        #live-clock { 
            position: fixed; bottom: 15px; left: 15px; 
            background: #2d3436; color: white; 
            padding: 8px 20px; border-radius: 15px; 
            font-size: 1.4rem; font-family: monospace; z-index: 1000; 
        }

        .bounce { animation: bounce 1s infinite alternate; display: inline-block; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 50px;
        }
    </style>
</head>
<body>

    <!-- 紅綠燈指示器 -->
    <div class="traffic-light-container">
        <div id="light-red" class="light-circle light-red"></div>
        <div id="light-yellow" class="light-circle light-yellow"></div>
        <div id="light-green" class="light-circle light-green"></div>
        <div id="light-label" class="light-label">準備開始</div>
    </div>

    <!-- 主選單 -->
    <div id="main-menu" class="container">
        <h1>🤔 選擇大挑戰</h1>
        <p style="font-size: 2.2rem; color: #636e72;">小朋友，遇見問題該怎麼辦？</p>
        <div style="font-size: 7rem; margin: 15px;" class="bounce">🌟</div>
        <div style="display: grid; grid-template-columns: 1fr; gap: 25px; max-width: 500px; margin: 0 auto; width: 100%;">
            <button onclick="startMode('book')" style="padding: 25px; font-size: 2.8rem; background: var(--warning); border: none; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 0px #fed330;">📖 繪本故事</button>
            <button onclick="startMode('challenge')" style="padding: 25px; font-size: 2.8rem; background: var(--success); border: none; border-radius: 30px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 8px 0px #21b677;">🎮 選擇大挑戰</button>
        </div>
    </div>

    <!-- 遊戲區域 -->
    <div id="game-area" class="container" style="display: none;">
        <div id="instr" class="instruction">我們一起看故事...</div>
        
        <div class="content-viewer">
            <img id="display-img" src="" alt="繪本圖片">
            <div id="score-grid" style="display: none;"></div>

            <div id="feedback-overlay" class="feedback-overlay">
                <div id="fb-icon" style="font-size: 8rem;"></div>
                <div id="fb-title" style="font-size: 3.5rem; font-weight: bold; color: var(--primary);"></div>
                <div id="fb-desc" style="font-size: 2.2rem; padding: 0 60px; margin-top: 15px; color: #636e72;"></div>
                <button class="nav-btn" style="margin-top: 30px; background: var(--secondary); box-shadow: 0 6px 0px #6c5ce7;" onclick="closeFeedback()">我知道了！</button>
            </div>
        </div>

        <div id="book-nav" class="nav-grid" style="display: none;">
            <button id="prev-btn" class="nav-btn" onclick="changePage(-1)">⬅ 上一頁</button>
            <span id="page-info" style="font-size: 2.2rem; font-weight: bold; color: var(--primary);"></span>
            <button id="next-btn" class="nav-btn" onclick="changePage(1)">下一頁 ➡</button>
        </div>

        <div id="challenge-options" class="choices-grid" style="display: none;">
            <button id="opt-a" class="choice-btn" style="border-color: #ff9f43; color:#ff9f43;" onclick="makeChoice(0)"></button>
            <button id="opt-b" class="choice-btn" style="border-color: #54a0ff; color:#54a0ff;" onclick="makeChoice(1)"></button>
        </div>

        <button class="home-btn" onclick="goHome()">🏠 回主選單</button>
    </div>

    <div id="live-clock">載入中...</div>

    <script>
        const students = ["盧楷", "意欣", "沄恩", "澄洋", "齊安", "欽銓", "宇晴"];
        let studentScores = {};
        students.forEach(s => studentScores[s] = 0);

        let slides = [];
        for (let i = 1; i <= 16; i++) {
            slides.push({ type: 'image', src: `images/${i}.jpg` });
            if (i >= 3 && i <= 15) {
                slides.push({ type: 'score' });
            }
        }

        const challengeData = [
            {
                scenario: "看到同學在位子上哭得很難過...",
                img: "images/1.jpg",
                options: [
                    { text: "A. 問他：你還好嗎？", correct: true, icon: "🍭", title: "好棒的選擇", desc: "同學心裡暖暖的，他知道有人關心他。" },
                    { text: "B. 裝作沒看到走開", correct: false, icon: "☁️", title: "可以更好喔", desc: "同學會覺得很孤單，沒人想幫他。" }
                ]
            },
            {
                scenario: "下課了，好想加入大家的遊戲...",
                img: "images/5.jpg",
                options: [
                    { text: "A. 直接衝進去搶玩具", correct: false, icon: "🌪️", title: "大家會傷心", desc: "同學會不開心，下次可能就不想跟你玩了。" },
                    { text: "B. 有禮貌問：我可以一起玩嗎？", correct: true, icon: "🎈", title: "受歡迎的第一步", desc: "大家覺得你有禮貌，會很歡迎你加入！" }
                ]
            }
        ];

        let currentMode = '';
        let slideIdx = 0;
        let challengeIdx = 0;

        // 紅綠燈控制函數
        function setTrafficLight(color) {
            const red = document.getElementById('light-red');
            const yellow = document.getElementById('light-yellow');
            const green = document.getElementById('light-green');
            const label = document.getElementById('light-label');
            
            red.classList.remove('active');
            yellow.classList.remove('active');
            green.classList.remove('active');

            if (color === 'red') {
                red.classList.add('active');
                label.innerText = '🔴 安靜專心看';
            } else if (color === 'yellow') {
                yellow.classList.add('active');
                label.innerText = '🟡 準備開始';
            } else if (color === 'green') {
                green.classList.add('active');
                label.innerText = '🟢 現在可以說話';
            }
        }

        function startMode(mode) {
            currentMode = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            if(mode === 'book') {
                document.getElementById('book-nav').style.display = 'flex';
                document.getElementById('challenge-options').style.display = 'none';
                slideIdx = 0;
                updateSlide();
            } else {
                document.getElementById('book-nav').style.display = 'none';
                document.getElementById('challenge-options').style.display = 'grid';
                challengeIdx = 0;
                setTrafficLight('green'); // 挑戰模式通常需要討論
                updateChallenge();
            }
        }

        function updateSlide() {
            const slide = slides[slideIdx];
            const imgEl = document.getElementById('display-img');
            const scoreGrid = document.getElementById('score-grid');
            const instr = document.getElementById('instr');

            if (slide.type === 'image') {
                imgEl.style.display = 'block';
                scoreGrid.style.display = 'none';
                imgEl.src = slide.src;
                instr.innerText = "我們一起看故事...";
                setTrafficLight('red'); // 看繪本時要安靜
            } else {
                imgEl.style.display = 'none';
                scoreGrid.style.display = 'grid';
                instr.innerText = "✨ 互動加分時間！";
                setTrafficLight('green'); // 互動時間可以說話
                renderScores();
            }
            
            document.getElementById('page-info').innerText = `${slideIdx + 1} / ${slides.length}`;
            document.getElementById('prev-btn').disabled = (slideIdx === 0);
            document.getElementById('next-btn').disabled = (slideIdx === slides.length - 1);
        }

        function renderScores() {
            const grid = document.getElementById('score-grid');
            grid.innerHTML = '';
            students.forEach(name => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div class="student-name">${name}</div>
                    <div class="student-score" id="score-${name}">${studentScores[name]}</div>
                    <button class="add-btn" onclick="addPoint('${name}')">+1</button>
                `;
                grid.appendChild(card);
            });
        }

        function addPoint(name) {
            studentScores[name]++;
            document.getElementById(`score-${name}`).innerText = studentScores[name];
            document.getElementById(`score-${name}`).animate([
                { transform: 'scale(1)' }, { transform: 'scale(1.4)', color: '#ff7675' }, { transform: 'scale(1)' }
            ], { duration: 300 });
        }

        function changePage(delta) {
            slideIdx += delta;
            updateSlide();
        }

        function updateChallenge() {
            const q = challengeData[challengeIdx];
            document.getElementById('instr').innerText = q.scenario;
            document.getElementById('display-img').style.display = 'block';
            document.getElementById('score-grid').style.display = 'none';
            document.getElementById('display-img').src = q.img;
            document.getElementById('opt-a').innerText = q.options[0].text;
            document.getElementById('opt-b').innerText = q.options[1].text;
            setTrafficLight('green'); // 挑戰討論時間
        }

        function makeChoice(idx) {
            const q = challengeData[challengeIdx];
            const choice = q.options[idx];
            document.getElementById('fb-icon').innerText = choice.icon;
            document.getElementById('fb-title').innerText = choice.title;
            document.getElementById('fb-desc').innerText = choice.desc;
            document.getElementById('feedback-overlay').style.display = 'flex';
        }

        function closeFeedback() {
            document.getElementById('feedback-overlay').style.display = 'none';
            challengeIdx++;
            if(challengeIdx < challengeData.length) {
                updateChallenge();
            } else {
                alert("🎉 任務挑戰成功！");
                goHome();
            }
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-area').style.display = 'none';
            setTrafficLight('yellow');
        }

        function updateClock() {
            document.getElementById('live-clock').innerText = "時間：" + new Date().toLocaleTimeString('zh-TW', {hour12:false});
        }
        setInterval(updateClock, 1000);
        updateClock();
        setTrafficLight('yellow'); // 初始狀態
    </script>
</body>
</html>
